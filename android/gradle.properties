org.gradle.jvmargs=-1024m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError

# Matikan parallel build — ini penyebab utama lag
org.gradle.parallel=false
# Matikan daemon agar RAM dibebaskan setelah build selesai
org.gradle.daemon=false
org.gradle.configureondemand=false
kotlin.incremental=false
android.useAndroidX=true
android.enableJetifier=true